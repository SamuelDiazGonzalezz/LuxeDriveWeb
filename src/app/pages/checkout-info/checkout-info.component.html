<div class="checkout-page">
  <div class="container">
    <a routerLink="/" class="back">← Volver al inicio</a>
    <h1>Finalizar compra</h1>

    <div class="steps-container">
      <div class="step active">
        <span class="step-number">1</span>
        <span class="step-label">Información</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <span class="step-number">2</span>
        <span class="step-label">Pago</span>
      </div>
    </div>

    <div class="checkout-content" *ngIf="vehicle as coche">
      <form id="info-form" class="info-section" [formGroup]="form" (ngSubmit)="submit()">
        <h2>Información Personal</h2>

        <div class="form-row">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" placeholder="Juan" formControlName="nombre">
          </div>
          <div class="form-group">
            <label>Apellidos *</label>
            <input type="text" placeholder="García" formControlName="apellidos">
          </div>
        </div>

        <div class="form-group">
          <label>Email *</label>
          <input type="email" placeholder="juan@email.com" formControlName="email">
        </div>

        <div class="form-group">
          <label>Teléfono *</label>
          <input type="tel" placeholder="+34 600 000 000" formControlName="telefono">
        </div>

        <div class="form-group">
          <label>Dirección *</label>
          <input type="text" placeholder="Calle Principal 123" formControlName="direccion">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Ciudad *</label>
            <input type="text" placeholder="Madrid" formControlName="ciudad">
          </div>
          <div class="form-group">
            <label>Código Postal *</label>
            <input type="text" placeholder="28001" formControlName="codigo_postal">
          </div>
          <div class="form-group">
            <label>País *</label>
            <select formControlName="pais">
              <option value="ES">España</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn">Continuar al Pago</button>
      </form>

      <aside class="summary-section">
        <h3>Resumen del Pedido</h3>

        <div class="product-item">
          <img id="product-img" [src]="coche.imagen" [alt]="coche.nombre">
          <div class="product-info">
            <span class="product-name">{{ coche.nombre }}</span>
            <span class="product-category">{{ coche.tipo }}</span>
            <span class="product-price">{{ coche.precio }}</span>
          </div>
        </div>

        <hr>

        <div class="summary-row">
          <span>Subtotal</span>
          <span>{{ coche.precio }}</span>
        </div>

        <div class="summary-row">
          <span>IVA (21%)</span>
          <span>{{ iva | number:'1.0-2' }} €</span>
        </div>

        <div class="summary-row total">
          <span>Total</span>
          <span class="total-price">{{ total | number:'1.0-2' }} €</span>
        </div>
      </aside>
    </div>
  </div>
</div>
