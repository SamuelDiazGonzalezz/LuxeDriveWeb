<div class="auth-page">
  <a routerLink="/login" class="back-link">← Volver</a>

  <div class="register-container">
    <h1 class="logo">LuxeDrive</h1>
    <p class="subtitle">Crea tu cuenta</p>

    <form id="registerForm" [formGroup]="form" (ngSubmit)="submit()">
      <div class="input-group">
        <label>Nombre Completo</label>
        <div class="input-wrapper">
          <span class="icon">👤</span>
          <input type="text" placeholder="Juan García" formControlName="name">
        </div>
        <div class="error-text" *ngIf="form.controls.name.touched && form.controls.name.invalid">El nombre es obligatorio.</div>
      </div>

      <div class="input-group">
        <label>Email</label>
        <div class="input-wrapper">
          <span class="icon">✉</span>
          <input type="email" placeholder="tu@email.com" formControlName="email">
        </div>
        <div class="error-text" *ngIf="form.controls.email.touched && form.controls.email.invalid">Introduce un email válido.</div>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" formControlName="password">
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">👁</button>
        </div>
      </div>

      <div class="input-group">
        <label>Confirmar Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="••••••••" formControlName="confirmPassword">
          <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword">👁</button>
        </div>
      </div>

      <div class="error-text" *ngIf="form.touched && form.errors?.['passwordMismatch']">Las contraseñas no coinciden.</div>
      <div class="error-text" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="register-btn">Registrarse</button>
    </form>

    <p class="login-text">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="login-link">Inicia sesión</a>
    </p>
  </div>
</div>
