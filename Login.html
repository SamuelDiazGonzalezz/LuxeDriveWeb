<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LuxeDrive - Login</title>
    <link rel="stylesheet" href="static/css/login.css">
    <script src="static/js/login.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<a href="index.html" class="back-link">← Volver al inicio</a>
<div class="login-container">

    <h1 class="logo">LuxeDrive</h1>
    <p class="subtitle">Inicia sesión en tu cuenta</p>

    <form id="loginForm">

        <div class="input-group">
            <label>Email</label>
            <div class="input-wrapper">
                <span class="icon">✉</span>
                <input type="email" id="username" placeholder="tu@email.com" required>
            </div>
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <span class="icon">🔒</span>
                <input type="password" id="password" placeholder="••••••••" required>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>
        </div>

        <button type="submit" class="login-btn">Iniciar Sesión</button>

    </form>

    <p class="register-text">
        ¿No tienes cuenta? <a href="registrarse.html" class="register-link">Regístrate</a>
    </p>

    <div class="demo-box">
        Demo: Usa cualquier email y contraseña para acceder
    </div>

</div>

<script>
    function togglePassword() {
        const input = document.getElementById("password");
        input.type = input.type === "password" ? "text" : "password";
    }
</script>

</body>
</html>
