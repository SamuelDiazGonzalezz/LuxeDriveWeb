<div class="auth-page">
  <a routerLink="/" class="back-link">← Volver al inicio</a>

  <div class="login-container">
    <h1 class="logo">LuxeDrive</h1>
    <p class="subtitle">Inicia sesión en tu cuenta</p>

    <form id="loginForm" [formGroup]="form" (ngSubmit)="submit()">
      <div class="input-group">
        <label>Email</label>
        <div class="input-wrapper">
          <span class="icon">✉</span>
          <input type="email" placeholder="tu@email.com" formControlName="email">
        </div>
        <div class="error-text" *ngIf="form.controls.email.touched && form.controls.email.invalid">Introduce un email válido.</div>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" formControlName="password">
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">👁</button>
        </div>
        <div class="error-text" *ngIf="form.controls.password.touched && form.controls.password.invalid">La contraseña es obligatoria.</div>
      </div>

      <button type="submit" class="login-btn">Iniciar Sesión</button>
      <div class="error-text" *ngIf="errorMessage">{{ errorMessage }}</div>
    </form>

    <p class="register-text">
      ¿No tienes cuenta? <a routerLink="/register" class="register-link">Regístrate</a>
    </p>

    <div class="demo-box">✨🚗✨</div>
  </div>
</div>
