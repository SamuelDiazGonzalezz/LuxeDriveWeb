<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pago | LuxeDrive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static/css/informacion.css">
    <link rel="stylesheet" href="static/css/pagos.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <a href="informacion.html" class="back">← Volver a información</a>
    <h1>Finalizar compra</h1>

    <div class="steps">
        <div class="step active">
            <div class="circle active">1</div>
            <span>Información</span>
        </div>

        <div class="line active-line"></div>

        <div class="step active">
            <div class="circle active">2</div>
            <span>Pago</span>
        </div>
    </div>

    <div class="grid">

        <!-- FORMULARIO DE PAGO -->
        <div class="card">
            <h2>Método de Pago</h2>

            <form id="paymentForm">

                <div class="input-group">
                    <label>Número de tarjeta *</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>

                <div class="input-group">
                    <label>Nombre en la tarjeta *</label>
                    <input type="text" required>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Fecha de expiración *</label>
                        <input type="text" id="expiry" placeholder="MM/AA" maxlength="5" required>
                    </div>

                    <div class="input-group">
                        <label>CVV *</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" class="btn">Confirmar Pago</button>

            </form>
        </div>

        <!--  RESUMEN DINÁMICO -->
        <aside class="summary-section">
            <h3>Resumen del Pedido</h3>

            <div class="product-item">
                <img id="product-img" src="" alt="">
                <div class="product-info">
                    <span class="product-name"></span>
                    <span class="product-category"></span>
                    <span class="product-price"></span>
                </div>
            </div>

            <hr>

            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal"></span>
            </div>

            <div class="summary-row">
                <span>IVA (21%)</span>
                <span id="iva"></span>
            </div>

            <div class="summary-row total">
                <span>Total</span>
                <span class="total-price" id="total"></span>
            </div>
        </aside>

    </div>
</div>

<script src="static/js/pagos.js"></script>
</body>
</html>
