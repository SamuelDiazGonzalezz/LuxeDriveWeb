<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pago | LuxeDrive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static/css/pagos.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <a href="index.html" class="back">← Volver al inicio</a>
    <h1>Finalizar compra</h1>

    <div class="steps">
        <div class="step completed">
            <div class="circle">1</div>
            <span>Información</span>
        </div>

        <div class="line active-line"></div>

        <div class="step active">
            <div class="circle active">2</div>
            <span>Pago</span>
        </div>
    </div>

    <div class="grid">

        <!-- FORMULARIO DE PAGO -->
        <div class="card">
            <h2>Método de Pago</h2>

            <form id="paymentForm">

                <div class="input-group">
                    <label>Número de tarjeta *</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>

                <div class="input-group">
                    <label>Nombre en la tarjeta *</label>
                    <input type="text" required>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Fecha de expiración *</label>
                        <input type="text" id="expiry" placeholder="MM/AA" maxlength="5" required>
                    </div>

                    <div class="input-group">
                        <label>CVV *</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" class="btn">Confirmar Pago</button>

            </form>
        </div>

        <!-- RESUMEN -->
        <div class="card summary">

            <h2>Resumen del Pedido</h2>

            <div class="product">
                <img src="img/car.jpg" alt="Superdeportivo">
                <div>
                    <h4>Superdeportivo GT</h4>
                    <p>Deportivo</p>
                </div>
            </div>

            <div class="summary-item">
                <span>Subtotal</span>
                <span>€285.000</span>
            </div>

            <div class="summary-item">
                <span>IVA (21%)</span>
                <span>€59.850</span>
            </div>

            <div class="summary-item total">
                <span>Total</span>
                <span>€344.850</span>
            </div>

        </div>

    </div>
</div>

<script src="pagos.js"></script>
</body>
</html>
